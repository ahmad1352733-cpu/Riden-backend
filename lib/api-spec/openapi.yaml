openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: RIDEN - Jordanian Ride-Hailing Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: trips
    description: Trips / rides
  - name: captain
    description: Captain operations
  - name: admin
    description: Admin operations
  - name: discountCodes
    description: Discount codes
  - name: complaints
    description: Complaints
  - name: routes
    description: Predefined routes

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── AUTH ──────────────────────────────────────────────────────────────────

  /auth/register:
    post:
      operationId: registerPassenger
      tags: [auth]
      summary: Register a new passenger
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PassengerRegisterInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login for all user types
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user profile
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ─── CAPTAIN REGISTRATION ──────────────────────────────────────────────────

  /captains/register:
    post:
      operationId: registerCaptain
      tags: [captain]
      summary: Register a new captain (pending admin approval)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaptainRegisterInput"
      responses:
        "201":
          description: Created (pending approval)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /captains/profile:
    get:
      operationId: getCaptainProfile
      tags: [captain]
      summary: Get captain profile including balance
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Captain"

  /captains/availability:
    patch:
      operationId: updateCaptainAvailability
      tags: [captain]
      summary: Toggle captain online/offline status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AvailabilityUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Captain"

  /captains/location:
    patch:
      operationId: updateCaptainLocation
      tags: [captain]
      summary: Update captain GPS location
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LocationUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /captains/trips:
    get:
      operationId: getCaptainTrips
      tags: [captain]
      summary: Get captain trip history
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trip"

  /captains/earnings:
    get:
      operationId: getCaptainEarnings
      tags: [captain]
      summary: Get captain earnings summary
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaptainEarnings"

  /captains/pending-trip:
    get:
      operationId: getCaptainPendingTrip
      tags: [captain]
      summary: Get nearest pending trip request for captain
      responses:
        "200":
          description: OK (null if no pending trip)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripOrNull"

  /captains/transactions:
    get:
      operationId: getCaptainTransactions
      tags: [captain]
      summary: Get captain balance transactions
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"

  # ─── TRIPS ─────────────────────────────────────────────────────────────────

  /trips:
    get:
      operationId: getPassengerTrips
      tags: [trips]
      summary: Get current passenger trip history
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trip"

    post:
      operationId: requestTrip
      tags: [trips]
      summary: Passenger requests a new trip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trips/active:
    get:
      operationId: getActiveTrip
      tags: [trips]
      summary: Get passenger's current active trip
      responses:
        "200":
          description: OK (null if no active trip)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripOrNull"

  /trips/fare-estimate:
    post:
      operationId: estimateFare
      tags: [trips]
      summary: Estimate fare before requesting a trip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FareEstimateInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FareEstimate"

  /trips/{id}:
    get:
      operationId: getTrip
      tags: [trips]
      summary: Get trip details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trips/{id}/cancel:
    patch:
      operationId: cancelTrip
      tags: [trips]
      summary: Passenger cancels a trip
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"

  /trips/{id}/accept:
    patch:
      operationId: acceptTrip
      tags: [trips]
      summary: Captain accepts a trip
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"

  /trips/{id}/start:
    patch:
      operationId: startTrip
      tags: [trips]
      summary: Captain starts a trip
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"

  /trips/{id}/complete:
    patch:
      operationId: completeTrip
      tags: [trips]
      summary: Captain completes a trip
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteTripInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"

  /trips/{id}/rate:
    post:
      operationId: rateTrip
      tags: [trips]
      summary: Passenger rates a completed trip
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripRatingInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"

  /trips/{id}/tracking:
    get:
      operationId: getTripTracking
      tags: [trips]
      summary: Get captain's live location for an active trip
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackingInfo"

  # ─── DISCOUNT CODES ────────────────────────────────────────────────────────

  /discount-codes/validate:
    post:
      operationId: validateDiscountCode
      tags: [discountCodes]
      summary: Validate a discount code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiscountValidateInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscountCode"
        "404":
          description: Invalid or expired code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── COMPLAINTS ────────────────────────────────────────────────────────────

  /complaints:
    post:
      operationId: submitComplaint
      tags: [complaints]
      summary: Submit a complaint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComplaintInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Complaint"

  /complaints/my:
    get:
      operationId: getMyComplaints
      tags: [complaints]
      summary: Get current user's complaints
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Complaint"

  # ─── ROUTES ────────────────────────────────────────────────────────────────

  /routes:
    get:
      operationId: getRoutes
      tags: [routes]
      summary: Get all active predefined routes
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Route"

  # ─── ADMIN ─────────────────────────────────────────────────────────────────

  /admin/dashboard:
    get:
      operationId: getAdminDashboard
      tags: [admin]
      summary: Admin dashboard statistics
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboard"

  /admin/captains:
    get:
      operationId: getAdminCaptains
      tags: [admin]
      summary: List all captains
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Captain"

  /admin/captains/{id}/approve:
    patch:
      operationId: approveCaptain
      tags: [admin]
      summary: Approve or reject a captain registration
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaptainApprovalInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Captain"

  /admin/captains/{id}/credit:
    post:
      operationId: creditCaptain
      tags: [admin]
      summary: Add balance credit to a captain
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreditInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Captain"

  /admin/passengers:
    get:
      operationId: getAdminPassengers
      tags: [admin]
      summary: List all passengers
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /admin/trips:
    get:
      operationId: getAdminTrips
      tags: [admin]
      summary: List all trips with filters
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trip"

  /admin/complaints:
    get:
      operationId: getAdminComplaints
      tags: [admin]
      summary: List all complaints
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Complaint"

  /admin/complaints/{id}/resolve:
    patch:
      operationId: resolveComplaint
      tags: [admin]
      summary: Resolve a complaint
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComplaintResolveInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Complaint"

  /admin/routes:
    get:
      operationId: getAdminRoutes
      tags: [admin]
      summary: List all routes (admin)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Route"

    post:
      operationId: createRoute
      tags: [admin]
      summary: Create a new predefined route
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RouteInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Route"

  /admin/routes/{id}:
    patch:
      operationId: updateRoute
      tags: [admin]
      summary: Update a route
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RouteUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Route"

    delete:
      operationId: deleteRoute
      tags: [admin]
      summary: Delete a route
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/discount-codes:
    get:
      operationId: getAdminDiscountCodes
      tags: [admin]
      summary: List all discount codes
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DiscountCode"

    post:
      operationId: createDiscountCode
      tags: [admin]
      summary: Create a discount code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiscountCodeInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscountCode"

  /admin/discount-codes/{id}:
    delete:
      operationId: deleteDiscountCode
      tags: [admin]
      summary: Delete a discount code
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    SuccessResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    # ── User ──────────────────────────────────────────────────────────────────

    User:
      type: object
      required: [id, name, phone, email, role, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, captain, passenger]
        status:
          type: string
          enum: [active, suspended]
        createdAt:
          type: string
          format: date-time

    Captain:
      type: object
      required: [id, name, phone, email, role, status, isApproved, isOnline, balance, rating, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        role:
          type: string
        status:
          type: string
        isApproved:
          type: boolean
        approvalStatus:
          type: string
          enum: [pending, approved, rejected]
        isOnline:
          type: boolean
        balance:
          type: number
        rating:
          type: number
        totalTrips:
          type: integer
        licenseNumber:
          type: string
        vehicleMake:
          type: string
        vehicleModel:
          type: string
        vehiclePlate:
          type: string
        vehicleYear:
          type: integer
        vehicleColor:
          type: string
        currentLat:
          type: ["number", "null"]
        currentLng:
          type: ["number", "null"]
        createdAt:
          type: string
          format: date-time

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    PassengerRegisterInput:
      type: object
      required: [name, phone, email, password]
      properties:
        name:
          type: string
          minLength: 2
        phone:
          type: string
          minLength: 9
        email:
          type: string

        password:
          type: string
          minLength: 6

    CaptainRegisterInput:
      type: object
      required: [name, phone, email, password, licenseNumber, vehicleMake, vehicleModel, vehiclePlate, vehicleYear, vehicleColor]
      properties:
        name:
          type: string
          minLength: 2
        phone:
          type: string
          minLength: 9
        email:
          type: string

        password:
          type: string
          minLength: 6
        licenseNumber:
          type: string
        vehicleMake:
          type: string
        vehicleModel:
          type: string
        vehiclePlate:
          type: string
        vehicleYear:
          type: integer
        vehicleColor:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string

        password:
          type: string

    AvailabilityUpdate:
      type: object
      required: [isOnline]
      properties:
        isOnline:
          type: boolean

    LocationUpdate:
      type: object
      required: [lat, lng]
      properties:
        lat:
          type: number
        lng:
          type: number

    CaptainApprovalInput:
      type: object
      required: [approved]
      properties:
        approved:
          type: boolean
        reason:
          type: string

    CreditInput:
      type: object
      required: [amount]
      properties:
        amount:
          type: number
          minimum: 0.01
        note:
          type: string

    # ── Trip ──────────────────────────────────────────────────────────────────

    Trip:
      type: object
      required: [id, passengerId, status, pickupLat, pickupLng, pickupAddress, dropoffLat, dropoffLng, dropoffAddress, createdAt]
      properties:
        id:
          type: integer
        passengerId:
          type: integer
        captainId:
          type: ["integer", "null"]
        status:
          type: string
          enum: [pending, accepted, started, completed, cancelled]
        pickupLat:
          type: number
        pickupLng:
          type: number
        pickupAddress:
          type: string
        dropoffLat:
          type: number
        dropoffLng:
          type: number
        dropoffAddress:
          type: string
        fare:
          type: ["number", "null"]
        distanceKm:
          type: ["number", "null"]
        durationMin:
          type: ["number", "null"]
        discountPercent:
          type: ["number", "null"]
        finalFare:
          type: ["number", "null"]
        rating:
          type: ["integer", "null"]
        passenger:
          $ref: "#/components/schemas/User"
        captain:
          $ref: "#/components/schemas/Captain"
        createdAt:
          type: string
          format: date-time
        startedAt:
          type: ["string", "null"]
          format: date-time
        completedAt:
          type: ["string", "null"]
          format: date-time

    TripOrNull:
      oneOf:
        - $ref: "#/components/schemas/Trip"
        - type: "null"

    TripRequest:
      type: object
      required: [pickupLat, pickupLng, pickupAddress, dropoffLat, dropoffLng, dropoffAddress]
      properties:
        pickupLat:
          type: number
        pickupLng:
          type: number
        pickupAddress:
          type: string
        dropoffLat:
          type: number
        dropoffLng:
          type: number
        dropoffAddress:
          type: string
        discountCode:
          type: string

    CompleteTripInput:
      type: object
      required: [distanceKm, durationMin]
      properties:
        distanceKm:
          type: number
          minimum: 0
        durationMin:
          type: number
          minimum: 0

    TripRatingInput:
      type: object
      required: [rating]
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5

    FareEstimateInput:
      type: object
      required: [distanceKm, durationMin]
      properties:
        distanceKm:
          type: number
        durationMin:
          type: number
        discountCode:
          type: string

    FareEstimate:
      type: object
      required: [baseFare, distanceFare, timeFare, totalFare, discountAmount, finalFare]
      properties:
        baseFare:
          type: number
        distanceFare:
          type: number
        timeFare:
          type: number
        totalFare:
          type: number
        discountAmount:
          type: number
        finalFare:
          type: number
        discountPercent:
          type: number

    TrackingInfo:
      type: object
      required: [tripId, captainLat, captainLng, updatedAt]
      properties:
        tripId:
          type: integer
        captainLat:
          type: ["number", "null"]
        captainLng:
          type: ["number", "null"]
        updatedAt:
          type: string
          format: date-time

    CaptainEarnings:
      type: object
      required: [totalEarnings, todayEarnings, weekEarnings, monthEarnings, totalTrips, balance, commissionRate]
      properties:
        totalEarnings:
          type: number
        todayEarnings:
          type: number
        weekEarnings:
          type: number
        monthEarnings:
          type: number
        totalTrips:
          type: integer
        balance:
          type: number
        commissionRate:
          type: number

    Transaction:
      type: object
      required: [id, captainId, amount, type, createdAt]
      properties:
        id:
          type: integer
        captainId:
          type: integer
        tripId:
          type: ["integer", "null"]
        amount:
          type: number
        type:
          type: string
          enum: [trip_commission, admin_credit, trip_earning]
        note:
          type: string
        createdAt:
          type: string
          format: date-time

    # ── Discount Code ─────────────────────────────────────────────────────────

    DiscountCode:
      type: object
      required: [id, code, discountPercent, maxUses, currentUses, isActive, createdAt]
      properties:
        id:
          type: integer
        code:
          type: string
        discountPercent:
          type: number
        maxUses:
          type: integer
        currentUses:
          type: integer
        isActive:
          type: boolean
        expiresAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time

    DiscountValidateInput:
      type: object
      required: [code]
      properties:
        code:
          type: string

    DiscountCodeInput:
      type: object
      required: [code, discountPercent, maxUses]
      properties:
        code:
          type: string
          minLength: 3
        discountPercent:
          type: number
          minimum: 1
          maximum: 100
        maxUses:
          type: integer
          minimum: 1
        expiresAt:
          type: string
          format: date-time

    # ── Complaint ─────────────────────────────────────────────────────────────

    Complaint:
      type: object
      required: [id, userId, type, description, status, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        tripId:
          type: ["integer", "null"]
        type:
          type: string
          enum: [driver_behavior, app_issue, payment, route, other]
        description:
          type: string
        status:
          type: string
          enum: [open, resolved]
        adminNote:
          type: string
        user:
          $ref: "#/components/schemas/User"
        createdAt:
          type: string
          format: date-time
        resolvedAt:
          type: ["string", "null"]
          format: date-time

    ComplaintInput:
      type: object
      required: [type, description]
      properties:
        tripId:
          type: integer
        type:
          type: string
          enum: [driver_behavior, app_issue, payment, route, other]
        description:
          type: string
          minLength: 10

    ComplaintResolveInput:
      type: object
      required: [adminNote]
      properties:
        adminNote:
          type: string

    # ── Route ─────────────────────────────────────────────────────────────────

    Route:
      type: object
      required: [id, name, pickupArea, dropoffArea, isActive, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        pickupArea:
          type: string
        dropoffArea:
          type: string
        description:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    RouteInput:
      type: object
      required: [name, pickupArea, dropoffArea]
      properties:
        name:
          type: string
          minLength: 2
        pickupArea:
          type: string
        dropoffArea:
          type: string
        description:
          type: string

    RouteUpdate:
      type: object
      properties:
        name:
          type: string
        pickupArea:
          type: string
        dropoffArea:
          type: string
        description:
          type: string
        isActive:
          type: boolean

    # ── Admin Dashboard ───────────────────────────────────────────────────────

    AdminDashboard:
      type: object
      required: [totalPassengers, totalCaptains, pendingCaptains, totalTrips, activeTrips, completedTrips, cancelledTrips, todayTrips, totalRevenue, todayRevenue, openComplaints]
      properties:
        totalPassengers:
          type: integer
        totalCaptains:
          type: integer
        pendingCaptains:
          type: integer
        totalTrips:
          type: integer
        activeTrips:
          type: integer
        completedTrips:
          type: integer
        cancelledTrips:
          type: integer
        todayTrips:
          type: integer
        totalRevenue:
          type: number
        todayRevenue:
          type: number
        openComplaints:
          type: integer
        recentTrips:
          type: array
          items:
            $ref: "#/components/schemas/Trip"

kind = "mobile"
previewPath = "/captain-app/"
title = "RIDEN - Captain App"
version = "1.0.0"
id = "artifacts/riden-captain-app"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/captain-app/" ]
localPort = 20917

[services.development]
run = "pnpm --filter @workspace/riden-captain-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/riden-captain-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/riden-captain-app", "run", "serve" ]

[services.env]
PORT = "20917"
BASE_PATH = "/captain-app/"

kind = "web"
previewPath = "/"
title = "RIDEN - Passenger App"
version = "1.0.0"
id = "artifacts/riden-passenger"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21963

[services.development]
run = "pnpm --filter @workspace/riden-passenger run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/riden-passenger", "run", "build" ]
serve = "static"
publicDir = "artifacts/riden-passenger/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21963"
BASE_PATH = "/"
